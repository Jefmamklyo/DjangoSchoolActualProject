
<html>
<head>
    <title>Login</title>
</head>

<body>

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">
            Login
        </button>
    </form>
    <!-- If errors -->
    {% if form.errors %}
    <p>
        Invalid username or password
    </p>
    {% endif %}
</body>
</html>
