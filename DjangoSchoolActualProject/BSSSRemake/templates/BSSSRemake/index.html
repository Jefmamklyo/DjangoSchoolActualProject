<html>
<head>
    <title></title>
</head>
<body>
    <p>
        <h1> {{ projectName }}</h1>
        <h2>{{ title }}</h2>
        {{ content }}
    </p>

    {% for school in schools %}
    <h2>{{ school.name }}</h2>
    <ul>
        {% for course in school.courses.all %}
        <li>{{ course.name }}</li>
        {% empty %}
        <li>No courses assigned</li>
        {% endfor %}
    </ul>

    {% endfor %}

    <form method="post">
        {%csrf_token%}
        {{ forms.as_p}} <!-- Renders form fields inside <p> tags -->
        <button type="submit">Save</button>
    </form>
</body>
</html>
